# Default secrets file for new developers / CI builds
# Copy to secrets.properties and fill in your values
#
# Do not commit real secrets. Copy this file to secrets.properties and fill in
# real values locally, or provide them through CI/environment variables.

SUPABASE_URL=https://your-project.supabase.co
SUPABASE_ANON_KEY=your-supabase-anon-key
GOOGLE_WEB_CLIENT_ID=your-google-web-client-id.apps.googleusercontent.com
SENTRY_DSN=disabled
# Optional direct-call fallback for local development. Production/release builds
# should use the Supabase Edge Function proxies instead of shipping these keys.
TMDB_API_KEY=your-tmdb-api-key
TRAKT_CLIENT_ID=your-trakt-client-id
TRAKT_CLIENT_SECRET=your-trakt-client-secret
