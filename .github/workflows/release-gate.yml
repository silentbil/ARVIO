name: Release Gate

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate release test matrix
        run: python3 scripts/validate_release_cases.py

      - name: Compile debug Kotlin (playDebug)
        run: ./gradlew :app:compilePlayDebugKotlin --stacktrace

      - name: Run debug unit tests (playDebug)
        run: ./gradlew :app:testPlayDebugUnitTest --stacktrace

  benchmark-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Assemble benchmark module
        run: ./gradlew :benchmark:assemble --stacktrace
