[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Robots-Tag = "noindex, nofollow, noarchive"

# The update watcher polls this to detect new deploys — it must NEVER be cached
# (a stale copy would blind the watcher and strand iOS PWAs on old bundles).
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store"

# The app-shell HTML must never be edge-cached: a stale HTML document points at
# an old hashed CSS/JS bundle, so a self-updater reload would just re-serve the
# old styles (the "top bar didn't change" symptom). Hashed /_next/static assets
# stay immutable-cacheable via their content hash; only the HTML is uncached.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# The one-time "Open in VLC" setup script must download, not render in the tab.
[[headers]]
  for = "/vlc-setup.bat"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment; filename=\"vlc-setup.bat\""
