[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Robots-Tag = "noindex, nofollow, noarchive"

# The update watcher polls this to detect new deploys — it must NEVER be cached
# (a stale copy would blind the watcher and strand iOS PWAs on old bundles).
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store"
