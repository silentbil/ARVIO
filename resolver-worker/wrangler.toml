name = "arvio-resolver"
main = "src/index.ts"
compatibility_date = "2026-07-01"
routes = [
  { pattern = "resolve.arvio.tv/*", zone_name = "arvio.tv" },
  # TMDB metadata edge cache: keeps the app's startup burst off Netlify (its
  # per-IP abuse limiter flagged a household IP once — white screens). Misses
  # are fetched from arvio-web.netlify.app via Cloudflare egress.
  { pattern = "web.arvio.tv/api/tmdb/*", zone_name = "arvio.tv" }
]

[vars]
ALLOWED_ORIGINS = "https://web.arvio.tv,http://localhost:3000,http://localhost:3100,http://localhost:3101"
SOURCE_CACHE_TTL_SECONDS = "180"
ADDON_TIMEOUT_MS = "15000"
ADDON_EXTENDED_TIMEOUT_MS = "35000"

[[kv_namespaces]]
binding = "RESOLVER_KV"
id = "26a386f371184d1b89c51940367e2d2c"
